<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tareas</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=5">
</head>
<body>
    <header>
        <h1>Tareas</h1>
        <p>Organiza tus tareas de manera eficiente</p>
    </header>

    <div class="layout">

        <aside>
            <p>Mis listas</p>
            <ul>
                <li class="filtro-aside active" data-filtro="todas">Todas</li>
                <li class="filtro-aside" data-filtro="trabajo">Trabajo</li>
                <li class="filtro-aside" data-filtro="estudio">Estudio</li>
                <li class="filtro-aside" data-filtro="personal">Personal</li>
            </ul>
        </aside>

    <main>
        <section>
            <h2>En progreso</h2>
            <div class="formulario-nueva-tarea">
                <input type="text" id="input-tarea" placeholder="¿Qué hay que hacer?">
                <select id="select-categoria">
                    <option value="trabajo">Trabajo</option>
                    <option value="estudio">Estudio</option>
                    <option value="personal">Personal</option>
                </select>
                <select id="select-prioridad">
                    <option value="alta">Alta</option>
                    <option value="media">Media</option>
                    <option value="baja">Baja</option>
                </select>
                <button id="btn-añadir">Añadir tarea</button>
            </div>

            <div class="buscador">
                <input type="text" id="input-busqueda" placeholder="Buscar tarea...">
            </div>

            <div id="contenedor-tareas"></div>

            </section>
    </main>

    </div>

    <script src="app.js"></script>
</body>
</html>
