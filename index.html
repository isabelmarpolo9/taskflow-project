<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Tareas</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="output.css">
</head>
<body class="bg-white dark:bg-gray-950 text-gray-900 dark:text-gray-100 font-sans min-h-screen">

    <!-- HEADER -->
    <header class="bg-gray-900 border-b border-gray-800 px-4 py-3 flex items-center justify-between flex-wrap gap-2">
        <div class="flex items-center gap-2">
            <span class="text-purple-400 text-xl">✦</span>
            <h1 class="text-xl font-bold text-gray-100" style="font-family: 'Fraunces', serif;">
                Gestión de Tareas
            </h1>
        </div>
        <button id="btn-tema" class="bg-gray-800 hover:bg-gray-700 text-gray-300 border border-gray-700 rounded-full px-3 py-1 text-sm cursor-pointer transition-all duration-200">
            🌙 Modo claro
        </button>
    </header>

    <!-- LAYOUT -->
    <div class="flex flex-col md:flex-row min-h-screen">

        <!-- ASIDE -->
        <aside class="w-full md:w-56 bg-gray-900 border-b md:border-b-0 md:border-r border-gray-800 p-4 flex flex-row md:flex-col gap-4 md:gap-6 overflow-x-auto">
            <div>
                <p class="hidden md:block text-xs font-bold uppercase tracking-widest text-gray-600">Mis listas</p>
                <ul class="flex flex-row md:flex-col gap-1 md:gap-1 w-full">
                    <li class="filtro-aside active flex flex-col items-center md:flex-row gap-1 md:gap-2 px-3 py-2 rounded-md text-gray-400 cursor-pointer transition-all duration-200 hover:bg-purple-900/20 hover:text-purple-400" data-filtro="todas">
                    <span>📋</span>
                    <span class="text-xs md:text-base">Todas</span>
                    </li>
                    <li class="filtro-aside flex flex-col items-center md:flex-row gap-1 md:gap-2 px-3 py-2 rounded-md text-gray-400 cursor-pointer transition-all duration-200 hover:bg-purple-900/20 hover:text-purple-400" data-filtro="trabajo">
                    <span>💼</span>
                    <span class="text-xs md:text-base">Trabajo</span>
                    </li>
                    <li class="filtro-aside flex flex-col items-center md:flex-row gap-1 md:gap-2 px-3 py-2 rounded-md text-gray-400 cursor-pointer transition-all duration-200 hover:bg-purple-900/20 hover:text-purple-400" data-filtro="estudio">
                    <span>📚</span>
                    <span class="text-xs md:text-base">Estudio</span>
                    </li>
                    <li class="filtro-aside flex flex-col items-center md:flex-row gap-1 md:gap-2 px-3 py-2 rounded-md text-gray-400 cursor-pointer transition-all duration-200 hover:bg-purple-900/20 hover:text-purple-400" data-filtro="personal">
                    <span>🏠</span>
                    <span class="text-xs md:text-base">Personal</span>
                    </li>
                </ul>
            </div>
        </aside>

        <!-- MAIN -->
        <main class="flex-1 p-8">
            <section>
                <h2 class="text-xl font-semibold text-gray-800 dark:text-gray-200 mb-6">En progreso</h2>
                

                <!-- BUSCADOR -->
                <div class="mb-4">
                    <input 
                        type="text" 
                        id="input-busqueda" 
                        placeholder="Buscar tarea..." 
                        class="bg-gray-900 border border-gray-700 text-gray-200 rounded-xl px-4 py-2 text-sm outline-none w-72 transition-all duration-200 focus:border-purple-500 focus:ring-1 focus:ring-purple-500"
                    >
                </div>

                <!-- FORMULARIO -->
                <div class="flex gap-3 mb-6 flex-wrap">
                    <input 
                        type="text" 
                        id="input-tarea" 
                        placeholder="¿Qué hay que hacer?" 
                        minlength="1"
                        maxlength="120"
                        autocomplete="off"
                        inputmode="text"
                        class="bg-gray-900 border border-gray-700 text-gray-200 rounded-xl px-4 py-2 text-sm outline-none flex-1 min-w-48 transition-all duration-200 focus:border-purple-500 focus:ring-1 focus:ring-purple-500"
                    >
                    <select 
                        id="select-categoria" 
                        class="bg-gray-900 border border-gray-700 text-gray-200 rounded-xl px-4 py-2 text-sm outline-none cursor-pointer transition-all duration-200 focus:border-purple-500"
                    >
                        <option value="trabajo">Trabajo</option>
                        <option value="estudio">Estudio</option>
                        <option value="personal">Personal</option>
                    </select>
                    <select 
                        id="select-prioridad" 
                        class="bg-gray-900 border border-gray-700 text-gray-200 rounded-xl px-4 py-2 text-sm outline-none cursor-pointer transition-all duration-200 focus:border-purple-500"
                    >
                        <option value="alta">Alta</option>
                        <option value="media">Media</option>
                        <option value="baja">Baja</option>
                    </select>
                    <button 
                        id="btn-añadir" 
                        class="bg-purple-600 hover:bg-purple-500 text-white rounded-xl px-5 py-2 text-sm font-medium cursor-pointer transition-all duration-200 hover:-translate-y-0.5"
                    >
                        Añadir tarea
                    </button>
                </div>

                <!-- MENSAJES DE VALIDACIÓN -->
                <p id="form-error" class="hidden text-sm text-red-400 mb-6" role="status" aria-live="polite"></p>

                <!-- CONTENEDOR TAREAS -->
                <div id="contenedor-tareas" class="flex flex-col gap-3"></div>

            </section>
        </main>

    </div>

    <script type="module" src="src/app.js"></script>
</body>
</html>
